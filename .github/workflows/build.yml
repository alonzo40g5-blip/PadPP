name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Show repository contents
        run: find . -maxdepth 3 -not -path '*/.git*' | head -40

      - name: Unzip project if it was uploaded as a zip
        shell: bash
        run: |
          if ! find . -maxdepth 3 -name settings.gradle.kts -not -path '*/.git*' | grep -q .; then
            ZIP=$(find . -maxdepth 2 -iname '*.zip' -not -path '*/.git*' | head -n 1)
            if [ -n "$ZIP" ]; then
              echo "No Gradle project found — extracting $ZIP"
              unzip -q -o "$ZIP" -d extracted
            fi
          fi

      - name: Locate Gradle project
        id: proj
        shell: bash
        run: |
          FOUND=$(find . -maxdepth 5 -name settings.gradle.kts -not -path '*/build/*' -not -path '*/.git*' | head -n 1)
          if [ -z "$FOUND" ]; then
            echo "::error::No Gradle project found. Upload NotepadPP-android.zip (or the project files) to this repository."
            exit 1
          fi
          DIR=$(dirname "$FOUND")
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "Building project in: $DIR"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        working-directory: ${{ steps.proj.outputs.dir }}
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NotepadPP-debug-apk
          path: ${{ steps.proj.outputs.dir }}/app/build/outputs/apk/debug/app-debug.apk

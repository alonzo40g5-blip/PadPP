name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      # Works whether the project files sit at the repo root
      # or inside a NotepadPP/ subfolder
      - name: Locate Gradle project
        id: proj
        shell: bash
        run: |
          FOUND=$(find . -maxdepth 3 -name settings.gradle.kts -not -path '*/build/*' | head -n 1)
          DIR=$(dirname "${FOUND:-.}")
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "Building project in: $DIR"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Build debug APK
        working-directory: ${{ steps.proj.outputs.dir }}
        run: gradle assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NotepadPP-debug-apk
          path: ${{ steps.proj.outputs.dir }}/app/build/outputs/apk/debug/app-debug.apk
